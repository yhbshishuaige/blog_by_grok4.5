<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>天气 · Weather</title>
  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.18);
      --glass-border: rgba(255, 255, 255, 0.28);
      --glass-highlight: rgba(255, 255, 255, 0.45);
      --text: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.72);
      --text-tertiary: rgba(255, 255, 255, 0.5);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      --radius: 28px;
      --ease: cubic-bezier(0.32, 0.72, 0, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      user-select: none;
      -webkit-user-select: none;
      background: #0a0e1a;
    }

    /* Ambient page background — shifts with active card */
    .page-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      transition: background 0.8s var(--ease);
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(255, 180, 80, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 80% 60%, rgba(80, 140, 255, 0.25) 0%, transparent 50%),
        linear-gradient(160deg, #1a2744 0%, #0d1528 50%, #0a1020 100%);
    }

    .page-bg.sunny {
      background:
        radial-gradient(ellipse 90% 70% at 30% 30%, rgba(255, 200, 80, 0.45) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 75% 70%, rgba(255, 140, 60, 0.2) 0%, transparent 50%),
        linear-gradient(160deg, #3a6ea5 0%, #1e4a7a 45%, #0f2d52 100%);
    }

    .page-bg.windy {
      background:
        radial-gradient(ellipse 80% 60% at 40% 40%, rgba(140, 180, 210, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(200, 220, 240, 0.2) 0%, transparent 45%),
        linear-gradient(160deg, #5a7a8a 0%, #3a5568 45%, #1e3344 100%);
    }

    .page-bg.rainy {
      background:
        radial-gradient(ellipse 80% 60% at 50% 30%, rgba(60, 90, 160, 0.4) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(40, 60, 120, 0.3) 0%, transparent 50%),
        linear-gradient(160deg, #2a3a5c 0%, #1a2540 45%, #0e1528 100%);
    }

    .page-bg.snowy {
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(180, 210, 255, 0.3) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(140, 180, 230, 0.2) 0%, transparent 45%),
        linear-gradient(160deg, #6a8aaa 0%, #3a5570 45%, #1e3048 100%);
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 28px 40px 32px;
    }

    /* Top bar — iOS style */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeSlideDown 0.7s var(--ease) 0.1s forwards;
    }

    .location {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .location h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.4px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    }

    .location .meta {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.2px;
    }

    .time-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .time-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34c759;
      box-shadow: 0 0 8px #34c759;
      animation: pulse 2s ease-in-out infinite;
    }

    /* Cards grid — landscape 4 columns */
    .cards {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      min-height: 0;
    }

    /* Weather card */
    .card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      isolation: isolate;
      box-shadow: var(--shadow);
      transform: scale(1) translateY(0);
      transition:
        transform 0.45s var(--ease),
        box-shadow 0.45s var(--ease),
        opacity 0.4s var(--ease);
      opacity: 0;
      animation: cardIn 0.7s var(--ease) forwards;
      will-change: transform;
    }

    .card:nth-child(1) { animation-delay: 0.15s; }
    .card:nth-child(2) { animation-delay: 0.25s; }
    .card:nth-child(3) { animation-delay: 0.35s; }
    .card:nth-child(4) { animation-delay: 0.45s; }

    .card:hover {
      transform: scale(1.03) translateY(-6px);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
    }

    .card:active {
      transform: scale(0.98) translateY(0);
      transition-duration: 0.15s;
    }

    .card.active {
      transform: scale(1.04) translateY(-8px);
      box-shadow:
        0 0 0 2px rgba(255, 255, 255, 0.5),
        0 32px 80px rgba(0, 0, 0, 0.4);
    }

    .card.dimmed {
      opacity: 0.55;
      transform: scale(0.96);
      filter: saturate(0.7);
    }

    .card.dimmed:hover {
      opacity: 0.8;
      filter: saturate(0.9);
      transform: scale(0.98) translateY(-2px);
    }

    /* Card gradient backgrounds */
    .card-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .card.sunny .card-bg {
      background: linear-gradient(165deg, #4facfe 0%, #5b9cf5 30%, #f9a825 70%, #ff8a3d 100%);
    }

    .card.windy .card-bg {
      background: linear-gradient(165deg, #89a7b8 0%, #6b8a9c 40%, #4a6a7c 100%);
    }

    .card.rainy .card-bg {
      background: linear-gradient(165deg, #3a4a6e 0%, #2a3a5c 40%, #1a2540 100%);
    }

    .card.snowy .card-bg {
      background: linear-gradient(165deg, #a8c4d8 0%, #7a9bb5 40%, #4a6a88 100%);
    }

    /* Glass overlay */
    .card-glass {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.12) 0%,
        rgba(255, 255, 255, 0.02) 40%,
        rgba(0, 0, 0, 0.08) 100%
      );
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      pointer-events: none;
    }

    .card-glass::before {
      content: "";
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
    }

    /* Weather animation layer */
    .weather-fx {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      pointer-events: none;
    }

    /* —— Sunny —— */
    .sun {
      position: absolute;
      top: 18%;
      right: 14%;
      width: 72px;
      height: 72px;
    }

    .sun-core {
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff9e0, #ffd54f 50%, #ff9800);
      box-shadow:
        0 0 30px rgba(255, 200, 50, 0.7),
        0 0 60px rgba(255, 160, 40, 0.4);
      animation: sunPulse 3s ease-in-out infinite;
    }

    .sun-ray {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      transform: translate(-50%, -50%);
      animation: sunSpin 20s linear infinite;
    }

    .sun-ray span {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 14px;
      margin-left: -2px;
      margin-top: -7px;
      border-radius: 2px;
      background: rgba(255, 220, 100, 0.85);
      transform-origin: center 36px;
      box-shadow: 0 0 8px rgba(255, 200, 50, 0.5);
    }

    .sun-ray span:nth-child(1) { transform: rotate(0deg) translateY(-36px); }
    .sun-ray span:nth-child(2) { transform: rotate(45deg) translateY(-36px); }
    .sun-ray span:nth-child(3) { transform: rotate(90deg) translateY(-36px); }
    .sun-ray span:nth-child(4) { transform: rotate(135deg) translateY(-36px); }
    .sun-ray span:nth-child(5) { transform: rotate(180deg) translateY(-36px); }
    .sun-ray span:nth-child(6) { transform: rotate(225deg) translateY(-36px); }
    .sun-ray span:nth-child(7) { transform: rotate(270deg) translateY(-36px); }
    .sun-ray span:nth-child(8) { transform: rotate(315deg) translateY(-36px); }

    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 50px;
      filter: blur(0.5px);
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .sunny .cloud-1 {
      width: 70px;
      height: 22px;
      bottom: 28%;
      left: 8%;
      opacity: 0.7;
      animation: cloudDrift 12s ease-in-out infinite;
    }

    .sunny .cloud-1::before {
      width: 28px; height: 28px; top: -16px; left: 12px;
    }

    .sunny .cloud-1::after {
      width: 36px; height: 36px; top: -22px; left: 28px;
    }

    .sunny .cloud-2 {
      width: 50px;
      height: 16px;
      bottom: 38%;
      right: 10%;
      opacity: 0.5;
      animation: cloudDrift 16s ease-in-out infinite reverse;
    }

    .sunny .cloud-2::before {
      width: 20px; height: 20px; top: -12px; left: 8px;
    }

    .sunny .cloud-2::after {
      width: 26px; height: 26px; top: -16px; left: 20px;
    }

    /* —— Windy —— */
    .wind-line {
      position: absolute;
      height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.7), transparent);
      animation: windBlow linear infinite;
    }

    .wind-line:nth-child(1) { top: 22%; left: -40%; width: 55%; animation-duration: 2.2s; animation-delay: 0s; }
    .wind-line:nth-child(2) { top: 32%; left: -50%; width: 70%; animation-duration: 1.8s; animation-delay: 0.3s; }
    .wind-line:nth-child(3) { top: 42%; left: -30%; width: 45%; animation-duration: 2.5s; animation-delay: 0.6s; }
    .wind-line:nth-child(4) { top: 52%; left: -45%; width: 60%; animation-duration: 2.0s; animation-delay: 0.2s; }
    .wind-line:nth-child(5) { top: 62%; left: -35%; width: 50%; animation-duration: 2.3s; animation-delay: 0.8s; }
    .wind-line:nth-child(6) { top: 28%; left: -55%; width: 40%; animation-duration: 1.6s; animation-delay: 1.1s; height: 1.5px; opacity: 0.5; }
    .wind-line:nth-child(7) { top: 48%; left: -40%; width: 65%; animation-duration: 2.1s; animation-delay: 0.5s; }
    .wind-line:nth-child(8) { top: 58%; left: -50%; width: 35%; animation-duration: 1.9s; animation-delay: 1.4s; height: 1.5px; opacity: 0.6; }

    .leaf {
      position: absolute;
      width: 10px;
      height: 6px;
      background: #8bc34a;
      border-radius: 0 100% 0 100%;
      opacity: 0.8;
      animation: leafFly 4s ease-in-out infinite;
    }

    .leaf:nth-child(9) { top: 30%; left: -10%; animation-delay: 0s; background: #aed581; }
    .leaf:nth-child(10) { top: 50%; left: -10%; animation-delay: 1.2s; background: #cddc39; width: 8px; height: 5px; }
    .leaf:nth-child(11) { top: 40%; left: -10%; animation-delay: 2.4s; background: #7cb342; }

    /* —— Rainy —— */
    .rain-drop {
      position: absolute;
      width: 2px;
      height: 14px;
      background: linear-gradient(180deg, transparent, rgba(180, 210, 255, 0.8));
      border-radius: 1px;
      animation: rainFall linear infinite;
    }

    .cloud-dark {
      position: absolute;
      background: rgba(80, 100, 140, 0.7);
      border-radius: 50px;
      filter: blur(1px);
    }

    .cloud-dark::before,
    .cloud-dark::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .rainy .cloud-dark.cd1 {
      width: 90px;
      height: 28px;
      top: 12%;
      left: 10%;
      animation: cloudDrift 10s ease-in-out infinite;
    }

    .rainy .cloud-dark.cd1::before {
      width: 36px; height: 36px; top: -20px; left: 14px;
    }

    .rainy .cloud-dark.cd1::after {
      width: 44px; height: 44px; top: -28px; left: 36px;
    }

    .rainy .cloud-dark.cd2 {
      width: 70px;
      height: 22px;
      top: 18%;
      right: 8%;
      opacity: 0.6;
      animation: cloudDrift 14s ease-in-out infinite reverse;
    }

    .rainy .cloud-dark.cd2::before {
      width: 28px; height: 28px; top: -16px; left: 10px;
    }

    .rainy .cloud-dark.cd2::after {
      width: 34px; height: 34px; top: -22px; left: 28px;
    }

    .lightning {
      position: absolute;
      top: 20%;
      left: 45%;
      width: 3px;
      height: 40px;
      background: #fff;
      clip-path: polygon(40% 0%, 100% 0%, 55% 45%, 80% 45%, 0% 100%, 35% 50%, 15% 50%);
      width: 20px;
      height: 50px;
      opacity: 0;
      filter: drop-shadow(0 0 8px #a0c4ff);
      animation: lightningFlash 5s ease-in-out infinite;
    }

    /* —— Snowy —— */
    .snowflake {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0.85;
      animation: snowFall linear infinite;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
    }

    .snowy .cloud {
      background: rgba(255, 255, 255, 0.9);
    }

    .snowy .cloud-1 {
      width: 85px;
      height: 26px;
      top: 12%;
      left: 8%;
      opacity: 0.85;
      animation: cloudDrift 14s ease-in-out infinite;
    }

    .snowy .cloud-1::before {
      width: 34px; height: 34px; top: -18px; left: 14px;
    }

    .snowy .cloud-1::after {
      width: 42px; height: 42px; top: -26px; left: 34px;
    }

    .snowy .cloud-2 {
      width: 60px;
      height: 18px;
      top: 20%;
      right: 10%;
      opacity: 0.65;
      animation: cloudDrift 18s ease-in-out infinite reverse;
    }

    .snowy .cloud-2::before {
      width: 24px; height: 24px; top: -14px; left: 8px;
    }

    .snowy .cloud-2::after {
      width: 30px; height: 30px; top: -18px; left: 22px;
    }

    /* Card content */
    .card-content {
      position: relative;
      z-index: 3;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px 20px 20px;
    }

    .card-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-label {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.2);
    }

    .card-condition {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .card-temp {
      display: flex;
      align-items: flex-start;
      gap: 2px;
      margin-top: auto;
    }

    .card-temp .num {
      font-size: 56px;
      font-weight: 200;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.15);
      transition: transform 0.4s var(--ease-spring);
    }

    .card.active .card-temp .num {
      transform: scale(1.06);
    }

    .card-temp .unit {
      font-size: 22px;
      font-weight: 300;
      margin-top: 8px;
      opacity: 0.8;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat .val {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .stat .lbl {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* Detail panel — expands on select */
    .detail {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 0 40px 28px;
      pointer-events: none;
      transform: translateY(120%);
      transition: transform 0.55s var(--ease);
    }

    .detail.open {
      transform: translateY(0);
      pointer-events: auto;
    }

    .detail-inner {
      display: flex;
      align-items: center;
      gap: 28px;
      padding: 18px 28px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(40px) saturate(1.4);
      -webkit-backdrop-filter: blur(40px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.25);
    }

    .detail-icon {
      font-size: 36px;
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.2));
    }

    .detail-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .detail-info h2 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .detail-info p {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .hourly {
      display: flex;
      gap: 6px;
    }

    .hour {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      min-width: 56px;
      transition: background 0.3s var(--ease), transform 0.3s var(--ease);
    }

    .hour:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }

    .hour .h-time {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
    }

    .hour .h-icon {
      font-size: 18px;
    }

    .hour .h-temp {
      font-size: 13px;
      font-weight: 600;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s, transform 0.25s var(--ease-spring);
      flex-shrink: 0;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.28);
      transform: scale(1.1);
    }

    .close-btn:active {
      transform: scale(0.92);
    }

    /* Hint */
    .hint {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: 0.3px;
      opacity: 0;
      animation: fadeSlideDown 0.6s var(--ease) 0.7s forwards;
      transition: opacity 0.4s;
    }

    .hint.hide { opacity: 0 !important; }

    /* Keyframes */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.9) translateY(24px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    @keyframes sunPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 200, 50, 0.7), 0 0 60px rgba(255, 160, 40, 0.4); }
      50% { transform: scale(1.08); box-shadow: 0 0 40px rgba(255, 200, 50, 0.9), 0 0 80px rgba(255, 160, 40, 0.55); }
    }

    @keyframes sunSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes cloudDrift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(18px); }
    }

    @keyframes windBlow {
      0% { transform: translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(280%); opacity: 0; }
    }

    @keyframes leafFly {
      0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      50% { transform: translateX(180px) translateY(20px) rotate(180deg); }
      90% { opacity: 0.6; }
      100% { transform: translateX(320px) translateY(-10px) rotate(360deg); opacity: 0; }
    }

    @keyframes rainFall {
      0% { transform: translateY(-20px); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(420px); opacity: 0.3; }
    }

    @keyframes lightningFlash {
      0%, 88%, 92%, 96%, 100% { opacity: 0; }
      90%, 94% { opacity: 1; }
    }

    @keyframes snowFall {
      0% { transform: translateY(-10px) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.9; }
      100% { transform: translateY(420px) translateX(30px) rotate(360deg); opacity: 0.2; }
    }

    /* Portrait fallback */
    @media (max-aspect-ratio: 1/1), (max-width: 700px) {
      .app { padding: 20px 16px 24px; }
      .cards {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 12px;
      }
      .card-temp .num { font-size: 42px; }
      .detail { padding: 0 16px 20px; }
      .detail-inner { flex-wrap: wrap; gap: 14px; padding: 14px 18px; }
      .hourly { overflow-x: auto; width: 100%; }
      .location h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="page-bg sunny" id="pageBg"></div>

  <div class="app">
    <header class="top-bar">
      <div class="location">
        <h1>北京</h1>
        <span class="meta" id="dateMeta">周四 · 7月9日</span>
      </div>
      <div class="time-pill">
        <span class="dot"></span>
        <span id="clock">--:--</span>
      </div>
    </header>

    <div class="cards" id="cards">
      <!-- Sunny -->
      <article class="card sunny active" data-weather="sunny" data-label="晴天" data-desc="阳光充足，适合户外活动" data-icon="☀️">
        <div class="card-bg"></div>
        <div class="weather-fx">
          <div class="sun">
            <div class="sun-ray">
              <span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span>
            </div>
            <div class="sun-core"></div>
          </div>
          <div class="cloud cloud-1"></div>
          <div class="cloud cloud-2"></div>
        </div>
        <div class="card-glass"></div>
        <div class="card-content">
          <div class="card-header">
            <span class="card-label">晴天</span>
            <span class="card-condition">Sunny</span>
          </div>
          <div class="card-temp">
            <span class="num">28</span>
            <span class="unit">°</span>
          </div>
          <div class="card-footer">
            <div class="stat"><span class="val">42%</span><span class="lbl">湿度</span></div>
            <div class="stat"><span class="val">UV 8</span><span class="lbl">紫外线</span></div>
            <div class="stat"><span class="val">3km/h</span><span class="lbl">风速</span></div>
          </div>
        </div>
      </article>

      <!-- Windy -->
      <article class="card windy" data-weather="windy" data-label="大风" data-desc="风力较强，外出请注意防风" data-icon="💨">
        <div class="card-bg"></div>
        <div class="weather-fx" id="windFx">
          <div class="wind-line"></div>
          <div class="wind-line"></div>
          <div class="wind-line"></div>
          <div class="wind-line"></div>
          <div class="wind-line"></div>
          <div class="wind-line"></div>
          <div class="wind-line"></div>
          <div class="wind-line"></div>
          <div class="leaf"></div>
          <div class="leaf"></div>
          <div class="leaf"></div>
        </div>
        <div class="card-glass"></div>
        <div class="card-content">
          <div class="card-header">
            <span class="card-label">大风</span>
            <span class="card-condition">Windy</span>
          </div>
          <div class="card-temp">
            <span class="num">19</span>
            <span class="unit">°</span>
          </div>
          <div class="card-footer">
            <div class="stat"><span class="val">55%</span><span class="lbl">湿度</span></div>
            <div class="stat"><span class="val">UV 3</span><span class="lbl">紫外线</span></div>
            <div class="stat"><span class="val">48km/h</span><span class="lbl">风速</span></div>
          </div>
        </div>
      </article>

      <!-- Rainy -->
      <article class="card rainy" data-weather="rainy" data-label="暴雨" data-desc="强降雨来袭，请携带雨具" data-icon="⛈️">
        <div class="card-bg"></div>
        <div class="weather-fx" id="rainFx">
          <div class="cloud-dark cd1"></div>
          <div class="cloud-dark cd2"></div>
          <div class="lightning"></div>
        </div>
        <div class="card-glass"></div>
        <div class="card-content">
          <div class="card-header">
            <span class="card-label">暴雨</span>
            <span class="card-condition">Storm</span>
          </div>
          <div class="card-temp">
            <span class="num">16</span>
            <span class="unit">°</span>
          </div>
          <div class="card-footer">
            <div class="stat"><span class="val">92%</span><span class="lbl">湿度</span></div>
            <div class="stat"><span class="val">UV 1</span><span class="lbl">紫外线</span></div>
            <div class="stat"><span class="val">22km/h</span><span class="lbl">风速</span></div>
          </div>
        </div>
      </article>

      <!-- Snowy -->
      <article class="card snowy" data-weather="snowy" data-label="暴雪" data-desc="强降雪天气，路面湿滑注意安全" data-icon="❄️">
        <div class="card-bg"></div>
        <div class="weather-fx" id="snowFx">
          <div class="cloud cloud-1"></div>
          <div class="cloud cloud-2"></div>
        </div>
        <div class="card-glass"></div>
        <div class="card-content">
          <div class="card-header">
            <span class="card-label">暴雪</span>
            <span class="card-condition">Blizzard</span>
          </div>
          <div class="card-temp">
            <span class="num">-6</span>
            <span class="unit">°</span>
          </div>
          <div class="card-footer">
            <div class="stat"><span class="val">78%</span><span class="lbl">湿度</span></div>
            <div class="stat"><span class="val">UV 0</span><span class="lbl">紫外线</span></div>
            <div class="stat"><span class="val">35km/h</span><span class="lbl">风速</span></div>
          </div>
        </div>
      </article>
    </div>

    <p class="hint" id="hint">点击卡片查看详情 · 悬停预览动画</p>
  </div>

  <!-- Detail sheet -->
  <div class="detail" id="detail">
    <div class="detail-inner">
      <span class="detail-icon" id="detailIcon">☀️</span>
      <div class="detail-info">
        <h2 id="detailTitle">晴天</h2>
        <p id="detailDesc">阳光充足，适合户外活动</p>
      </div>
      <div class="hourly" id="hourly"></div>
      <button class="close-btn" id="closeBtn" aria-label="关闭">✕</button>
    </div>
  </div>

  <script>
    (function () {
      const pageBg = document.getElementById("pageBg");
      const cards = [...document.querySelectorAll(".card")];
      const detail = document.getElementById("detail");
      const hint = document.getElementById("hint");
      const closeBtn = document.getElementById("closeBtn");
      const hourlyEl = document.getElementById("hourly");
      const clockEl = document.getElementById("clock");
      const dateMeta = document.getElementById("dateMeta");

      const hourlyData = {
        sunny: [
          { t: "现在", i: "☀️", temp: "28°" },
          { t: "14时", i: "☀️", temp: "30°" },
          { t: "15时", i: "🌤", temp: "29°" },
          { t: "16时", i: "🌤", temp: "27°" },
          { t: "17时", i: "🌥", temp: "25°" },
        ],
        windy: [
          { t: "现在", i: "💨", temp: "19°" },
          { t: "14时", i: "🌬", temp: "18°" },
          { t: "15时", i: "💨", temp: "17°" },
          { t: "16时", i: "🌥", temp: "16°" },
          { t: "17时", i: "☁️", temp: "15°" },
        ],
        rainy: [
          { t: "现在", i: "⛈️", temp: "16°" },
          { t: "14时", i: "🌧", temp: "15°" },
          { t: "15时", i: "⛈️", temp: "15°" },
          { t: "16时", i: "🌧", temp: "14°" },
          { t: "17时", i: "🌦", temp: "14°" },
        ],
        snowy: [
          { t: "现在", i: "❄️", temp: "-6°" },
          { t: "14时", i: "🌨", temp: "-7°" },
          { t: "15时", i: "❄️", temp: "-8°" },
          { t: "16时", i: "🌨", temp: "-8°" },
          { t: "17时", i: "☁️", temp: "-9°" },
        ],
      };

      /* —— Generate rain drops —— */
      function spawnRain() {
        const fx = document.getElementById("rainFx");
        for (let i = 0; i < 36; i++) {
          const d = document.createElement("div");
          d.className = "rain-drop";
          d.style.left = Math.random() * 100 + "%";
          d.style.animationDuration = 0.5 + Math.random() * 0.6 + "s";
          d.style.animationDelay = Math.random() * 2 + "s";
          d.style.height = 10 + Math.random() * 12 + "px";
          d.style.opacity = 0.4 + Math.random() * 0.5;
          fx.appendChild(d);
        }
      }

      /* —— Generate snowflakes —— */
      function spawnSnow() {
        const fx = document.getElementById("snowFx");
        for (let i = 0; i < 40; i++) {
          const s = document.createElement("div");
          s.className = "snowflake";
          const size = 2 + Math.random() * 5;
          s.style.width = size + "px";
          s.style.height = size + "px";
          s.style.left = Math.random() * 100 + "%";
          s.style.animationDuration = 3 + Math.random() * 5 + "s";
          s.style.animationDelay = Math.random() * 4 + "s";
          s.style.opacity = 0.4 + Math.random() * 0.5;
          fx.appendChild(s);
        }
      }

      spawnRain();
      spawnSnow();

      /* —— Clock —— */
      function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, "0");
        const m = String(now.getMinutes()).padStart(2, "0");
        clockEl.textContent = h + ":" + m;

        const days = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
        dateMeta.textContent =
          days[now.getDay()] + " · " + (now.getMonth() + 1) + "月" + now.getDate() + "日";
      }
      updateClock();
      setInterval(updateClock, 10000);

      /* —— Select card —— */
      let activeWeather = "sunny";

      function selectCard(card) {
        const weather = card.dataset.weather;
        activeWeather = weather;

        cards.forEach((c) => {
          c.classList.toggle("active", c === card);
          c.classList.toggle("dimmed", c !== card);
        });

        pageBg.className = "page-bg " + weather;

        document.getElementById("detailIcon").textContent = card.dataset.icon;
        document.getElementById("detailTitle").textContent = card.dataset.label;
        document.getElementById("detailDesc").textContent = card.dataset.desc;

        hourlyEl.innerHTML = hourlyData[weather]
          .map(
            (h) =>
              `<div class="hour"><span class="h-time">${h.t}</span><span class="h-icon">${h.i}</span><span class="h-temp">${h.temp}</span></div>`
          )
          .join("");

        detail.classList.add("open");
        hint.classList.add("hide");
      }

      function closeDetail() {
        detail.classList.remove("open");
        cards.forEach((c) => {
          c.classList.remove("dimmed");
          if (c.dataset.weather === activeWeather) c.classList.add("active");
          else c.classList.remove("active");
        });
        hint.classList.remove("hide");
      }

      cards.forEach((card) => {
        card.addEventListener("click", () => {
          if (card.classList.contains("active") && detail.classList.contains("open")) {
            closeDetail();
          } else {
            selectCard(card);
          }
        });

        /* Parallax tilt on mouse move */
        card.addEventListener("mousemove", (e) => {
          const rect = card.getBoundingClientRect();
          const x = (e.clientX - rect.left) / rect.width - 0.5;
          const y = (e.clientY - rect.top) / rect.height - 0.5;
          const fx = card.querySelector(".weather-fx");
          if (fx) {
            fx.style.transform = `translate(${x * 12}px, ${y * 10}px)`;
          }
        });

        card.addEventListener("mouseleave", () => {
          const fx = card.querySelector(".weather-fx");
          if (fx) fx.style.transform = "";
        });
      });

      closeBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        closeDetail();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeDetail();
      });

      /* Soft pointer glow follow on cards */
      cards.forEach((card) => {
        card.addEventListener("pointermove", (e) => {
          const rect = card.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * 100;
          const y = ((e.clientY - rect.top) / rect.height) * 100;
          card.style.setProperty("--mx", x + "%");
          card.style.setProperty("--my", y + "%");
        });
      });
    })();
  </script>
</body>
</html>
