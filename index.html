<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Blog · 天气博客</title>
  <meta name="description" content="带天气与昼夜动画的丝滑博客" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/weather.css" />
  <link rel="stylesheet" href="styles/transitions.css" />
</head>
<body>
  <!-- Dynamic sky layers -->
  <div id="sky" class="sky" aria-hidden="true">
    <div class="sky-gradient"></div>
    <div class="sky-glow"></div>
    <div class="stars" id="stars"></div>
    <div class="sun-orb" id="sunOrb"></div>
    <div class="moon-orb" id="moonOrb"></div>
  </div>

  <!-- Weather particle canvas -->
  <canvas id="weatherCanvas" class="weather-canvas" aria-hidden="true"></canvas>

  <!-- Transition overlay -->
  <div id="transitionOverlay" class="transition-overlay" aria-hidden="true">
    <div class="transition-veil"></div>
    <div class="transition-particles" id="transitionParticles"></div>
    <div class="transition-label" id="transitionLabel"></div>
  </div>

  <!-- App shell -->
  <div id="app" class="app">
    <header class="site-header">
      <a href="#/" class="logo" data-nav>
        <span class="logo-mark"></span>
        <span class="logo-text">Weather Blog</span>
      </a>
      <div class="header-meta">
        <div class="time-control" id="timeControl">
          <button
            type="button"
            class="time-btn"
            id="timeBtn"
            aria-expanded="false"
            aria-controls="timeDialPanel"
            aria-pressed="false"
            title="调节时间 · 拖动轮盘预览昼夜"
          >
            <span class="time-btn-glyph" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
                <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.5" opacity="0.85"/>
                <path d="M12 7.5v5l3.2 1.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="time-btn-label">时间</span>
          </button>
          <div class="time-dial-panel" id="timeDialPanel" hidden role="dialog" aria-label="时间轮盘">
            <div class="time-dial-head">
              <span class="time-dial-title">流转时光</span>
              <span class="time-dial-hint">拖动轮盘</span>
            </div>
            <div class="time-dial" id="timeDial">
              <div class="time-dial-aura" aria-hidden="true"></div>
              <div class="time-dial-ring" id="timeDialRing">
                <div class="time-dial-ticks" id="timeDialTicks" aria-hidden="true"></div>
                <div class="time-dial-marks" id="timeDialMarks"></div>
                <div class="time-dial-hand" id="timeDialHand" aria-hidden="true">
                  <span class="time-dial-hand-knob"></span>
                </div>
                <div class="time-dial-core">
                  <span class="time-dial-display" id="timeDialDisplay">--:--</span>
                  <span class="time-dial-phase" id="timeDialPhase">—</span>
                </div>
              </div>
            </div>
            <button type="button" class="time-dial-live" id="timeDialLive" disabled>
              回到实时
            </button>
          </div>
        </div>
        <div class="weather-badge" id="weatherBadge" title="点击切换：晴/阴/小雨/中雨/大雨/小雪/中雪/大雪/大风/雷电">
          <span class="weather-icon" id="weatherIcon">☀️</span>
          <span class="weather-text" id="weatherText">加载中…</span>
        </div>
        <div class="clock" id="clock">--:--</div>
      </div>
    </header>

    <main id="main" class="main">
      <!-- Views injected by router -->
    </main>

    <footer class="site-footer">
      <p>背景随 24 小时天空流转 · 动画随天气变幻</p>
    </footer>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
